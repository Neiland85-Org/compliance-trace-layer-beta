services:

  backend:
    image: node:22
    working_dir: /app
    volumes:
      - .:/app
    command: node packages/trace-engine/server.js
    ports:
      - "4000:4000"

  frontend:
    image: node:22
    working_dir: /app/apps/console
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend