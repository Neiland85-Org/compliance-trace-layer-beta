version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: compliance-trace-postgres
    environment:
      POSTGRES_DB: compliance_trace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - compliance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api-gateway:
    build: ./backend/api-gateway
    container_name: compliance-trace-api-gateway
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/compliance_trace
      NODE_ENV: production
      PORT: 4000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      TRACE_SERVICE_URL: http://trace-service:4001
      COOKIE_CONSENT_SERVICE_URL: http://cookie-consent-service:4002
      LOG_LEVEL: info
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      trace-service:
        condition: service_started
      cookie-consent-service:
        condition: service_started
    networks:
      - compliance-network
    restart: unless-stopped

  trace-service:
    build: ./backend/trace-service
    container_name: compliance-trace-service
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/compliance_trace
      NODE_ENV: production
      PORT: 4001
      LOG_LEVEL: info
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compliance-network
    restart: unless-stopped

  cookie-consent-service:
    build: ./backend/cookie-consent-service
    container_name: compliance-cookie-consent-service
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/compliance_trace
      NODE_ENV: production
      PORT: 4002
      LOG_LEVEL: info
      LOG_FORMAT: json
      CONSENT_VERSION: 1.0.0
      CONSENT_EXPIRY_MONTHS: 12
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compliance-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: compliance-trace-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - compliance-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  compliance-network:
    driver: bridge