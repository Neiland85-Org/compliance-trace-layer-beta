name: CI

on:
  push:
    branches: [ main, refactor/product-core ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root
        run: npm install

      - name: Install frontend
        run: npm install --workspace demo/console

      - name: Build frontend
        run: npm run build --workspace demo/console