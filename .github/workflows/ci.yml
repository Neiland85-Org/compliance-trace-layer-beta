name: trace-platform-ci

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint (console)
        run: |
          if npm run lint --workspace=apps/console 2>/dev/null; then
            echo "lint passed"
          else
            echo "no lint script, skipping"
          fi

      - name: Build console
        run: npm run build --workspace=apps/console

  runtime-test:

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start deploy engine
        run: |
          node tools/deploy-engine/server.js &
          sleep 5

      - name: Deploy nginx test container
        run: |
          curl -X POST http://localhost:4000/deploy \
          -H "Content-Type: application/json" \
          -d '{"name":"ci-test","image":"nginx"}'

      - name: Verify container running
        run: docker ps

      - name: Verify registry endpoint
        run: curl http://localhost:4000/services

      - name: Stop container
        run: |
          curl -X DELETE http://localhost:4000/service/ci-test-8081 || true
