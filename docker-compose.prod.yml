# Production Docker Compose Configuration
# Use: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: compliance-trace-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compliance_trace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backend/database/migrations/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    networks:
      - compliance-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: compliance-trace-api-gateway-prod
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-compliance_trace}
      NODE_ENV: production
      PORT: 4000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TRACE_SERVICE_URL: http://trace-service:4001
      COOKIE_CONSENT_SERVICE_URL: http://cookie-consent-service:4002
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      postgres:
        condition: service_healthy
      trace-service:
        condition: service_healthy
      cookie-consent-service:
        condition: service_healthy
    networks:
      - compliance-network-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  trace-service:
    build:
      context: ./backend/trace-service
      dockerfile: Dockerfile
    container_name: compliance-trace-service-prod
    expose:
      - "4001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-compliance_trace}
      NODE_ENV: production
      PORT: 4001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DATABASE_POOL_MAX: 20
      DATABASE_POOL_IDLE_TIMEOUT: 30000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compliance-network-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  cookie-consent-service:
    build:
      context: ./backend/cookie-consent-service
      dockerfile: Dockerfile
    container_name: compliance-cookie-consent-service-prod
    expose:
      - "4002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-compliance_trace}
      NODE_ENV: production
      PORT: 4002
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CONSENT_VERSION: ${CONSENT_VERSION:-1.0.0}
      CONSENT_EXPIRY_MONTHS: ${CONSENT_EXPIRY_MONTHS:-12}
      DATABASE_POOL_MAX: 20
      DATABASE_POOL_IDLE_TIMEOUT: 30000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compliance-network-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      target: production
      dockerfile: Dockerfile
    container_name: compliance-trace-frontend-prod
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
      VITE_MODE: production
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - compliance-network-prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.125'
          memory: 128M

volumes:
  postgres_data_prod:
    driver: local

networks:
  compliance-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
